spring:
  datasource:
    # NON_KEYWORDS: organization_settings.value and the future groups table collide with H2 reserved words
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=GROUPS,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  
jpassbolt:
  auth:
    register-token-expiry-days: 10
  jwt:
    secret: REDACTED-LEGACY-HMAC
    expiration: 3600000
    # Tests run with an ephemeral in-memory RS256 pair (no key pair is
    # committed to the repository anymore).
    allow-ephemeral-dev-key: true
  gpg:
    server-key:
      private-location: classpath:gpg/server_private.asc
      public-location: classpath:gpg/server_public.asc
      passphrase: password
  settings:
    full-base-url: http://localhost:8080
    edition: ce
    version-number: "5.7.2"
    version-name: "Gnossienne No. 1"
    plugins:
      jwtAuthentication: true
      previewPassword: true

