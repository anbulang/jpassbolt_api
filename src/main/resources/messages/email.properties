# Transactional email copy (default / fallback bundle = English).
# Resolved by config.MailMessageConfig (ResourceBundleMessageSource, UTF-8) for
# any recipient locale without a dedicated email_<lang>.properties (e.g. de, fr).
# Chinese recipients get email_zh.properties; everyone else falls back here.
# Keys mirror email_en.properties / email_zh.properties exactly.

# --- shared scaffold ---
email.footer=JPassbolt — end-to-end encrypted password manager

# --- account recovery (sendRecoverEmail) ---
email.recover.subject=Your account recovery, {0}
email.recover.title=Account recovery
email.recover.intro=You requested to recover access to your JPassbolt vault.
email.recover.instruction=Make sure you have your <strong>private key backup</strong> at hand, then continue:
email.recover.cta=Recover my account
email.recover.ignore=If you didn't request this, you can ignore this email. The link expires and can be used once.

# --- setup invite (sendSetupInviteEmail) ---
email.invite.subject=Finish setting up your JPassbolt account
email.invite.title=Welcome to JPassbolt
email.invite.intro=An account was created for you. Finish setting it up to start using your vault:
email.invite.cta=Set up my account

# --- recovery complete (sendRecoverCompleteEmail) ---
email.complete.subject=Your JPassbolt account recovery is complete
email.complete.title=Recovery complete
email.complete.intro=Your account recovery completed successfully. You now have access to your vault again.
email.complete.warning=If this wasn't you, contact your administrator immediately.

# --- button helper (shared) ---
email.button.fallback=Or open this link: {0}
