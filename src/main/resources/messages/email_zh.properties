# Transactional email copy (Chinese / 简体中文).
# Loaded by config.MailMessageConfig (ResourceBundleMessageSource, UTF-8)
# and consumed by service.email.MailService, rendered when the recipient's
# resolved locale (AccountLocaleService) is zh (e.g. zh-CN). Keys mirror
# email_en.properties exactly. Args: {0} is the recovery/setup link where used.

# --- shared scaffold ---
email.footer=JPassbolt — 端到端加密密码管理器

# --- account recovery (sendRecoverEmail) ---
email.recover.subject=您的账户恢复，{0}
email.recover.title=账户恢复
email.recover.intro=您请求恢复对 JPassbolt 密码库的访问权限。
email.recover.instruction=请确保您已准备好<strong>私钥备份</strong>，然后继续：
email.recover.cta=恢复我的账户
email.recover.ignore=如果这不是您本人的操作，可以忽略此邮件。该链接会过期，且只能使用一次。

# --- setup invite (sendSetupInviteEmail) ---
email.invite.subject=完成您的 JPassbolt 账户设置
email.invite.title=欢迎使用 JPassbolt
email.invite.intro=已为您创建账户。请完成设置以开始使用您的密码库：
email.invite.cta=设置我的账户

# --- recovery complete (sendRecoverCompleteEmail) ---
email.complete.subject=您的 JPassbolt 账户恢复已完成
email.complete.title=恢复完成
email.complete.intro=您的账户恢复已成功完成。您现在可以重新访问您的密码库了。
email.complete.warning=如果这不是您本人的操作，请立即联系您的管理员。

# --- button helper (shared) ---
email.button.fallback=或打开此链接：{0}
