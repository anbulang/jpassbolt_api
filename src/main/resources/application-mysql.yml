spring:
  datasource:
    # Secrets are injected through environment variables — never committed.
    url: ${JPASSBOLT_DB_URL:jdbc:mysql://localhost:3306/jpassbolt}
    username: ${JPASSBOLT_DB_USERNAME:jpassbolt}
    password: ${JPASSBOLT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
