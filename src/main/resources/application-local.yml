spring:
  datasource:
    # NON_KEYWORDS: organization_settings.value and the future groups table collide with H2 reserved words
    url: jdbc:h2:mem:jpassbolt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=GROUPS,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  # Local dev SMTP -> MailHog (run: docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog).
  # No auth/TLS; view captured mail at http://localhost:8025. Switching to a real
  # provider in prod is just these host/port/credentials, no code change.
  mail:
    host: ${JPASSBOLT_SMTP_HOST:localhost}
    port: ${JPASSBOLT_SMTP_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jpassbolt:
  # Turn on real email sending in local dev (captured by MailHog above).
  email:
    enabled: true
  jwt:
    # Local development only: generate an ephemeral in-memory RS256 pair at
    # startup instead of requiring an externally injected key pair.
    allow-ephemeral-dev-key: true
  gpg:
    server-key:
      # Passphrase of the committed DEV-ONLY server key (gpg/server_private.asc).
      passphrase: password
