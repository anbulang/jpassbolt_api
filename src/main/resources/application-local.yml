spring:
  datasource:
    # NON_KEYWORDS: organization_settings.value and the future groups table collide with H2 reserved words
    url: jdbc:h2:mem:jpassbolt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=GROUPS,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

jpassbolt:
  jwt:
    # Local development only: generate an ephemeral in-memory RS256 pair at
    # startup instead of requiring an externally injected key pair.
    allow-ephemeral-dev-key: true
  gpg:
    server-key:
      # Passphrase of the committed DEV-ONLY server key (gpg/server_private.asc).
      passphrase: password
