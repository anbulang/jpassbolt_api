server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jpassbolt_api
  datasource:
    url: jdbc:mysql://REDACTED-DB-HOST:3307/jpassbolt?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: REDACTED-ROTATED-DB-PW
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
logging:
  level:
    org.springframework.web: DEBUG
    com.jpassbolt.api: DEBUG

jpassbolt:
  auth:
    register-token-expiry-days: 10   # 对照 PHP PASSBOLT_AUTH_REGISTER_TOKEN_EXPIRY 默认 '10 days'
  jwt:
    # Legacy HS256 secret — no longer used for signing (RS256 key pair below);
    # still read by HealthcheckService (core.salt). Remove together with that check.
    secret: REDACTED-LEGACY-HMAC
    expiration: 3600000 # 1 hour
    # RS256 key pair. The committed dev keys (like gpg/server_private.asc) are for
    # dev/test only — production MUST override with a deployment-specific pair.
    private-key-location: classpath:jwt/jwt.key
    public-key-location: classpath:jwt/jwt.pem
    refresh-token-expiry-days: 30   # PHP RefreshTokenAbstractService default
    verify-token-expiry-hours: 1    # PHP VerifyTokenCreateService default
  gpg:
    server-key:
      private-location: classpath:gpg/server_private.asc
      public-location: classpath:gpg/server_public.asc
      passphrase: password
  version: 4.9.0
  healthcheck:
    index-endpoint-enabled: true
  settings:
    full-base-url: http://localhost:8080
    edition: ce
    version-number: "5.7.2"
    version-name: "Gnossienne No. 1"
    privacy-policy-url: ""
    terms-url: https://www.passbolt.com/terms
    plugins:
      jwtAuthentication: true
      previewPassword: true
      multiFactorAuthentication: true
      export: false
      import: false
      mobile: false
      desktop: false
