server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jpassbolt_api
  datasource:
    # Secrets are NEVER committed: inject the connection through environment
    # variables (or an external secret store). The committed defaults are
    # non-functional placeholders — the previously committed remote MySQL
    # credentials must be considered leaked and rotated.
    url: ${JPASSBOLT_DB_URL:jdbc:mysql://localhost:3306/jpassbolt?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${JPASSBOLT_DB_USERNAME:jpassbolt}
    password: ${JPASSBOLT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
logging:
  level:
    org.springframework.web: DEBUG
    com.jpassbolt.api: DEBUG

jpassbolt:
  # Base URL of the CLIENT (the React SPA), used to build the setup/recover links
  # placed in emails. Distinct from settings.full-base-url (the API/server URL):
  # the recovery link must open the SPA, not the JSON API.
  app:
    base-url: ${JPASSBOLT_APP_BASE_URL:http://localhost:5173}
  # Outbound email. Disabled by default: when off (or when no JavaMailSender bean
  # is configured, i.e. spring.mail.host unset), MailService LOGS the link instead
  # of sending — so default/test profiles need no SMTP. The `local` profile turns
  # this on and points spring.mail at a local MailHog.
  email:
    enabled: ${JPASSBOLT_EMAIL_ENABLED:false}
    from: ${JPASSBOLT_EMAIL_FROM:no-reply@jpassbolt.local}
  auth:
    register-token-expiry-days: 10   # 对照 PHP PASSBOLT_AUTH_REGISTER_TOKEN_EXPIRY 默认 '10 days'
    recover-token-expiry-days: 10    # 对照 PHP PASSBOLT_AUTH_RECOVER_TOKEN_EXPIRY 默认 '10 days'
  jwt:
    # Legacy HS256 secret — no longer used for signing (RS256 key pair below);
    # still read by HealthcheckService (core.salt). Inject via env, never commit.
    secret: ${JPASSBOLT_LEGACY_HMAC_SECRET:}
    expiration: 3600000 # 1 hour
    # RS256 key pair. NO key pair is bundled with the repository anymore (the
    # previously committed jwt.key/jwt.pem must be considered leaked and were
    # removed/rotated). Deployments MUST inject a deployment-specific pair via
    # these locations (file: or classpath:); startup fails fast otherwise.
    # Only the local/test profiles may opt into an ephemeral in-memory dev key
    # (allow-ephemeral-dev-key: true).
    private-key-location: ${JPASSBOLT_JWT_PRIVATE_KEY_LOCATION:}
    public-key-location: ${JPASSBOLT_JWT_PUBLIC_KEY_LOCATION:}
    allow-ephemeral-dev-key: false
    refresh-token-expiry-days: 30   # PHP RefreshTokenAbstractService default
    verify-token-expiry-hours: 1    # PHP VerifyTokenCreateService default
  gpg:
    server-key:
      private-location: ${JPASSBOLT_GPG_PRIVATE_KEY_LOCATION:classpath:gpg/server_private.asc}
      public-location: ${JPASSBOLT_GPG_PUBLIC_KEY_LOCATION:classpath:gpg/server_public.asc}
      # Inject via env; the committed dev key's passphrase only lives in the
      # local/test profiles.
      passphrase: ${JPASSBOLT_GPG_PASSPHRASE:}
  # Backend API / server version, surfaced by HealthcheckService
  # (info.currentVersion / remoteVersion). Distinct on purpose from
  # settings.version-number below, which is the bundled web-extension
  # (webapp) version — same split as official Passbolt, where the server and
  # the browser extension version independently.
  version: 4.9.0
  healthcheck:
    index-endpoint-enabled: true
  settings:
    full-base-url: http://localhost:8080
    edition: ce
    # Web-extension (webapp) version reported by GET /settings.json — the
    # version the plugin checks for its own UI/compatibility. Intentionally
    # different from jpassbolt.version above (the backend/server version).
    version-number: "5.7.2"
    version-name: "Gnossienne No. 1"
    privacy-policy-url: ""
    terms-url: https://www.passbolt.com/terms
    plugins:
      jwtAuthentication: true
      previewPassword: true
      multiFactorAuthentication: true
      export: false
      import: false
      mobile: false
      desktop: false
